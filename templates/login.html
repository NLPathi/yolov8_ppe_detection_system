{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
    <div class="container-fluid bg-imagel">
        <div class="row">
            <div class="col-md-8 offset-md-2">
                <div class="card bg-transparent border-0 move-upl" style="background-color: white; padding: 20px;">
                    <div class="card-header">
                        <h1 class="text-center text-dark">Login</h1>
                    </div>
                    <div class="card-body">
                        <form method="POST" action="{{ url_for('log_in') }}">
                            <div class="form-group">
                                <label for="firstname" class="text-dark">First Name:</label>
                                <input type="text" name="firstname" id="firstname" class="form-control" placeholder="Enter your First Name" required>
                            </div>
                            <div class="form-group">
                                <label for="password" class="text-dark">Password:</label>
                                <input type="password" name="password" id="password" placeholder="Enter your Password" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-primary btn-block btn-lg">Login</button>
                        </form>

                        {% if error %}
                            <p class="mt-3 text-danger">{{ error }}</p>
                        {% endif %}

                        {% if success %}
                            <p class="mt-3 text-success">{{ success }}</p>
                        {% endif %}

                        <p class="text-center mt-4 text-dark">Don't have an account? <a href="{{ url_for('register') }}" class="text-danger">Create an account</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
